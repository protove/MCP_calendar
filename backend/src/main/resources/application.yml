spring:
  application:
    name: mcp-calendar

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: Asia/Seoul

# Gemini API 설정
gemini:
  api:
    key: ${GEMINI_API_KEY:}
    model: gemini-2.5-flash-lite
    base-url: https://generativelanguage.googleapis.com/v1beta

# Weather API 설정
weather:
  api:
    key: ${WEATHER_API_KEY:}
    base-url: https://api.openweathermap.org/data/2.5
    default-city: Seoul
    cache-ttl-minutes: 30

# JWT 설정
jwt:
  secret: ${JWT_SECRET}  # 환경변수 필수 - 기본값 없음 (보안)
  access-token-expiration: ${JWT_ACCESS_EXPIRATION:1800000}    # 30분 (ms)
  refresh-token-expiration: ${JWT_REFRESH_EXPIRATION:604800000} # 7일 (ms)

---
# Development Profile
spring:
  config:
    activate:
      on-profile: dev

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/mcpcalendar}
    username: ${SPRING_DATASOURCE_USERNAME:mcpadmin}
    password: ${SPRING_DATASOURCE_PASSWORD:localpassword}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

logging:
  level:
    root: INFO
    com.mcp.calendar: DEBUG
    org.springframework.web: INFO
    org.springframework.web.reactive.function.client.ExchangeFunctions: WARN
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

server:
  port: 8080
  error:
    include-message: always
    include-stacktrace: on_param

---
# Production Profile
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 10
      connection-timeout: 30000

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  jpa:
    show-sql: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.PostgreSQLDialect

logging:
  level:
    root: WARN
    com.mcp.calendar: INFO

server:
  port: 8080
  error:
    include-message: never
    include-stacktrace: never